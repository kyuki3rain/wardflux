# web を GitHub Pages へデプロイする。
# PartyKit サーバは `pnpm deploy:server` で手動デプロイ（host は下記 VITE_PARTYKIT_HOST）。
# Settings > Pages > Source = GitHub Actions にしておくこと。
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy
  cancel-in-progress: true

# actions 本体も Node 24 で動かす（Node 20 廃止予定への対応）
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-deploy:
    name: Build & Deploy GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @wardflux/core test
      - name: Build
        env:
          VITE_PARTYKIT_HOST: wardflux.kyuki3rain.partykit.dev
          VITE_BASE: /wardflux/
        run: pnpm --filter @wardflux/web build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: packages/web/dist
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
